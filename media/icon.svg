<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#106ebe"/>
    </linearGradient>
    <linearGradient id="db" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="100%" style="stop-color:#cccccc"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect x="8" y="8" width="112" height="112" rx="24" ry="24" fill="url(#bg)"/>
  <!-- 数据库图标：三层圆筒 -->
  <!-- 顶盖 -->
  <ellipse cx="64" cy="40" rx="30" ry="10" fill="url(#db)" stroke="#999" stroke-width="1.5"/>
  <!-- 中层 -->
  <path d="M34 40 L34 64 A30 10 0 0 0 94 64 L94 40" fill="url(#db)" stroke="#999" stroke-width="1.5"/>
  <!-- 中盖 -->
  <ellipse cx="64" cy="64" rx="30" ry="10" fill="url(#db)" stroke="#999" stroke-width="1.5"/>
  <!-- 底层 -->
  <path d="M34 64 L34 88 A30 10 0 0 0 94 88 L94 64" fill="url(#db)" stroke="#999" stroke-width="1.5"/>
  <!-- 底盖 -->
  <ellipse cx="64" cy="88" rx="30" ry="10" fill="url(#db)" stroke="#999" stroke-width="1.5"/>
  <!-- SQL 文字 -->
  <text x="64" y="68" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0078d4" text-anchor="middle" dominant-baseline="central">SQL</text>
</svg>
